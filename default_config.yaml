config_version: 3
ambient_assist_enabled: true
default_deep_mode: pro
memory_curation_enabled: true
show_status_ui: true
max_auto_edit_files: 8
dependency_install_requires_checkpoint: true
destructive_actions_require_checkpoint: true
protected_paths:
  - agent.py
  - initialize.py
  - usr/plugins/
accepted_rules: []
mode_policies:
  flash:
    subagent_limit: 0
    repair_limit: 0
  standard:
    subagent_limit: 0
    repair_limit: 1
  pro:
    subagent_limit: 0
    repair_limit: 1
  ultra:
    subagent_limit: 3
    repair_limit: 3
context_pressure_threshold: 0.7
context_model_window: 128000
workspace_enabled: true
token_budget: 0
cost_tracking_enabled: true
